<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중앙중 검 강화게임</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding-top: 50px; }
        .screen { background: white; color: black; padding: 20px; border-radius: 15px; width: 350px; margin: auto; }
        #sword-img { width: 150px; height: 150px; background: #eee; border: 2px solid #333; margin: 10px; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div class="screen">
    <h1>🗡️ 중앙중 검 강화게임</h1>
    <img id="sword-img" src="bokgeom.png" alt="검 이미지">
    <p>💰 잔고: <span id="money">50,000</span>원</p>
    <h2>검 레벨: <span id="level-display">+0</span></h2>
    
    <p>강화 비용: <span id="upgrade-cost">1,000</span>원</p>
    <p>성공 확률: <span id="success-rate">100.0</span>%</p>
    
    <button onclick="upgradeSword()">⚡ 검 강화하기</button>
    <button onclick="sellSword()">💰 검 판매하기</button>
    <div id="game-log" style="margin-top:20px; font-size: 0.8em; color: gray;"></div>
</div>

<script>
    let money = 50000;
    let swordLevel = 0;

    // 1. 강화 확률 로직: 3강부터 3.5%씩 감소
    function getSuccessRate() {
        if (swordLevel < 3) return 100;
        return Math.max(100 - ((swordLevel - 2) * 3.5), 1.0);
    }

    // 2. 강화 비용 로직: 1~20강은 1000원씩, 20강 이후는 3000원씩 상승
    function getUpgradeCost() {
        if (swordLevel < 20) {
            return (swordLevel + 1) * 1000;
        } else {
            return 20000 + ((swordLevel - 19) * 3000);
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = money.toLocaleString();
        document.getElementById('level-display').innerText = "+" + swordLevel;
        document.getElementById('upgrade-cost').innerText = getUpgradeCost().toLocaleString();
        document.getElementById('success-rate').innerText = getSuccessRate().toFixed(1);
    }

    function upgradeSword() {
        let cost = getUpgradeCost();
        if (money < cost) {
            alert("돈이 부족합니다!");
            return;
        }
        
        money -= cost;
        
        if (Math.random() * 100 <= getSuccessRate()) {
            swordLevel++;
            document.getElementById('game-log').innerHTML = "성공! +"+swordLevel + "<br>" + document.getElementById('game-log').innerHTML;
        } else {
            swordLevel = 0;
            document.getElementById('game-log').innerHTML = "실패! 검 파괴됨<br>" + document.getElementById('game-log').innerHTML;
        }
        updateUI();
    }

    function sellSword() {
        money += (swordLevel * 1000);
        swordLevel = 0;
        updateUI();
        alert("판매 완료!");
    }

    updateUI();
</script>

</body>
</html>
