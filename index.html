<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교수님 학점 강화 게임</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        #game-screen, #shop-screen { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .stats { font-size: 1.2rem; margin: 10px 0; }
        #game-log { height: 150px; overflow-y: scroll; border: 1px solid #ccc; margin-top: 10px; font-size: 0.9rem; text-align: left; padding: 5px; }
        #fragment-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; min-height: 30px; }
    </style>
</head>
<body>

    <div id="game-screen">
        <h1>강화의 대장간</h1>
        <div class="stats">
            💰 돈: <span id="money">50,000</span>원<br>
            🛡️ 방지권: <span id="shield-count">0</span>개<br>
            ⚔️ 검 레벨: <span id="level-display">+0</span>
        </div>
        
        <p>강화 비용: <span id="upgrade-cost">500</span>원</p>
        <p id="shield-req" style="color: red; font-size: 0.8rem;"></p>
        
        <button onclick="upgradeSword()">⚡ 강화하기</button>
        <button onclick="sellSword()">💰 검 판매</button>
        <br><br>
        <button onclick="combineFragments()">🛠️ 파편 10개로 복구/강화</button>
        <button onclick="goToShop()">🛒 상점 가기</button>

        <div id="fragment-inventory" style="margin-top: 20px;">
            <h4>보유한 파편 (💎)</h4>
            <div id="fragment-list"></div>
        </div>

        <div id="game-log"></div>
    </div>

    <div id="shop-screen" style="display: none;">
        <h2>🛒 강화 상점</h2>
        <p>방지권 개당 5,000원</p>
        <button onclick="buyShield()">🛡️ 방지권 구매</button>
        <br><br>
        <button onclick="goToGame()">🔙 대장간으로 돌아가기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
